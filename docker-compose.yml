# docker-compose up
version: '3'
services:
  registry:
    image: patrikx3/p3x-redis-ui:latest
    ports:
      - "7843:7843"
    volumes:
      - /home/user/p3x-redis-ui-settings:/settings
    healthcheck:
      test: ["CMD", "node", "-e", "const http = require('http'); http.get('http://localhost:7843/health', (r) => { process.exit(r.statusCode === 200 ? 0 : 1) }).on('error', () => process.exit(1))"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s
    stop_grace_period: 10s
