apiVersion: apps/v1
kind: Deployment
metadata:
  name: p3x-redis-ui
  namespace: {{ .Release.Namespace }}
spec:
  replicas: {{ .Values.replicas }}
  selector:
    matchLabels:
      app.kubernetes.io/name: p3x-redis-ui
  template:
    metadata:
      labels:
        app.kubernetes.io/name: p3x-redis-ui
    spec:
      terminationGracePeriodSeconds: {{ .Values.terminationGracePeriodSeconds | default 15 }}
      containers:
      - name: p3x-redis-ui
        image: "{{ .Values.image.repository }}:{{ .Values.image.tag }}"
        imagePullPolicy: {{ .Values.image.pullPolicy }}
        ports:
        - name: p3x-redis-ui
          containerPort: 7843
        livenessProbe:
          httpGet:
            path: /health
            port: 7843
          initialDelaySeconds: {{ .Values.livenessProbe.initialDelaySeconds | default 10 }}
          periodSeconds: {{ .Values.livenessProbe.periodSeconds | default 30 }}
          timeoutSeconds: {{ .Values.livenessProbe.timeoutSeconds | default 5 }}
        readinessProbe:
          httpGet:
            path: /health?ready=true
            port: 7843
          initialDelaySeconds: {{ .Values.readinessProbe.initialDelaySeconds | default 5 }}
          periodSeconds: {{ .Values.readinessProbe.periodSeconds | default 10 }}
          timeoutSeconds: {{ .Values.readinessProbe.timeoutSeconds | default 5 }}
        {{- with .Values.resources }}
        resources:
          {{ toYaml . | nindent 10 }}
        {{- end }}
        volumeMounts:
        - name: p3x-redis-ui-settings
          mountPath: /settings/.p3xrs-conns.json
          subPath: .p3xrs-conns.json
      volumes:
        - name: p3x-redis-ui-settings
          configMap:
            name: p3x-redis-ui-settings
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
